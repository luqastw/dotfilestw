set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g status-style bg=default
set -g status-position bottom
set -g status-left "  #[fg=#a8d5e2,bold]#S #[fg=#4a7aaa] "
set -g status-left-length 50
set -g status-right "" 
set -g status-justify left

set -g window-status-format "#[fg=#4a7aaa] #I:#W "
set -g window-status-current-format "#[fg=#5fb3d9,bold] #I:#W "

set -g pane-border-style fg='#1a1a2e'
set -g pane-active-border-style fg='#5fb3d9'

set -g message-style bg=default,fg='#a8d5e2'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-strategy-nvim 'session'
run '~/.tmux/plugins/tpm/tpm'
